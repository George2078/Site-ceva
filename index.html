<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiect Liceul Elie Radu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .school-name {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 40px;
            font-weight: bold;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .heart {
            position: fixed;
            font-size: 2em;
            user-select: none;
            pointer-events: none;
            animation: float-up 3s ease-out forwards;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(var(--drift)) scale(0.5);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bine ati venit la proiectul elevilor din liceul Elie Radu din Ploiesti</h1>
        <div class="school-name">Elie Radu High School, Ploiesti</div>
        <button onclick="createHeart()">💌 Make Hearts!</button>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            
            // Random horizontal position
            const x = Math.random() * window.innerWidth;
            heart.style.left = x + 'px';
            heart.style.top = window.innerHeight + 'px';
            
            // Random drift for more dynamic effect
            const drift = (Math.random() - 0.5) * 200;
            heart.style.setProperty('--drift', drift + 'px');
            
            document.body.appendChild(heart);
            
            // Remove heart after animation completes
            setTimeout(() => {
                heart.remove();
            }, 3000);
        }

        // Optional: Create multiple hearts on click
        function createMultipleHearts() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 100);
            }
        }

        // Update button to create multiple hearts
        document.querySelector('button').onclick = createMultipleHearts;
    </script>
</body>
</html>
